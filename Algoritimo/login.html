<style>
    body{
        padding: 0;

    .container{
        width: 100%;

        justify-content: center;

    .buttonL{

        align-items: center;
    }

    .btnLogin{
        border: none;
        background-color: #21516C;
        color: white;
        width: 40%;
        border-radius: 10px;
        height: 3rem;
        font-family: "Playfair Display", serif;
        font-optical-sizing: auto;
         font-style: normal;
         font-weight: 100;
    }

    .urlCadastro{
        display: flex;
        justify-content: flex-start;
    }

    .urlCadastro a{
        color: #21516C;
    }
</style>

<script>
function validar(){
    let email = ipt_email.value;
    let senha = ipt_senha.value;
    let texto = '';

    let posArroba = email.indexOf('@');
    let posCom = email.indexOf('.com');

    if(email == '' || senha == ''){
        texto = 'Preencha todos os campos';
    } else if(posArroba != -1 && posCom != -1 && posArroba < posCom){
        texto = 'Email válido';
    } else{
        texto = 'Email inválido';
    }

    div_mensagem.innerHTML = texto;
}
</script>
