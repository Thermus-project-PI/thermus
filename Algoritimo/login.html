<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<center>
    <h1>Login</h1>

    <p>E-mail:</p>
    <input type="email" id="ipt_email" placeholder="seuemail@exemplo.com">

    <p>Senha:</p>
    <input type="password" id="ipt_senha" placeholder="Digite sua senha:">

    <br><br>
    <button onclick="validar()">Entrar</button>

    <br><br>
    <div id="div_mensagem"></div>
</center>
</body>
</html>
<script>
function validar(){
    let email = ipt_email.value;
    let senha = ipt_senha.value;
    let texto = '';

    let posArroba = email.indexOf('@');
    let posCom = email.indexOf('.com');

    if(email == '' || senha == ''){
        texto = 'Preencha todos os campos';
    } else if(posArroba != -1 && posCom != -1 && posArroba < posCom){
        texto = 'Email válido';
    } else{
        texto = 'Email inválido';
    }

    div_mensagem.innerHTML = texto;
}
</script>
