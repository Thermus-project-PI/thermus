<body>
    <div class="container">

                <img src="./img/logo.png" alt="Logo Thermus">
                <img src="./img/THERMUS.png">
            </div>
            <div class="campos">
                <input type="text" class="campo" placeholder="Email">

            </div>
            <div class="buttonL">
                <button class="btnLogin">Entra</button>

</html>
<script>

function validar(){
    let email = ipt_email.value;
    let senha = ipt_senha.value;
    let texto = '';

    let posArroba = email.indexOf('@');
    let posCom = email.indexOf('.com');

    if(email == '' || senha == ''){
        texto = 'Preencha todos os campos';
    } else if(posArroba != -1 && posCom != -1 && posArroba < posCom){
        texto = 'Email válido';
    } else{
        texto = 'Email inválido';
    }

    div_mensagem.innerHTML = texto;
}
   
</script>
