<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login</title>
</head>

<body>
    <div class="container">
        <div class="content">
        <a href="/index.html"><img src="img/seta.png" class="seta"></a>
        <div class="logo">
                <img src="./img/logo.png" alt="Logo Thermus">
                <img src="./img/THERMUS.png">
        </div>
    <div class="campos">
        <input class="campo" type="email" id="ipt_email" placeholder="Email">
        <input class="campo" type="password" id="ipt_senha" placeholder="Digite sua senha:">
        <button class="botao" onclick="validar()">Entrar</button>
        <p class="mensagem">Ainda não possui uma conta?  <a href="/cadastroUser.html">cadastre-se</a></p>
        <div id="div_mensagem" class="aviso"></div> 
            </div>
        </div>
    </div>
</body>

</html>
<script>

function validar() {
    let email = ipt_email.value;
    let senha = ipt_senha.value;

    let posArroba = email.indexOf('@');
    let posCom = email.indexOf('.com');

    if (email == '') {
        div_mensagem.innerHTML = 'Preencha o email';
        return;
    }

    if (
        posArroba <= 0 || 
        posCom <= posArroba + 1 || 
        posCom != email.length - 4
    ) {
        div_mensagem.innerHTML = 'Email inválido';
        return;
    }

    if (senha == '') {
        div_mensagem.innerHTML = 'Preencha a senha';
        return;
    }

    div_mensagem.innerHTML = 'Login válido';
}
</script>
