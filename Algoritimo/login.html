<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login</title>
</head>

<body>
    <center>
    <div class="card-login">
    <a href="/index"><img src="img/seta.png" class="seta"></a>
    <img src="img/logo.png" class="logo" alt="logo thermus">
        <h1 class="titulo">LOGIN</h1>
            <div class="campo">
            <input type="email" id="ipt_email" placeholder="Email">
            <input type="password" id="ipt_senha" placeholder="Digite sua senha:">
            <button class="botao" onclick="validar()">Entrar</button>
            <div id="div_mensagem" class="mensagem"></div> 
            </div>
        </div>
    </center>
</body>

</html>
<script>

function validar(){
    let email = ipt_email.value;
    let senha = ipt_senha.value;
    let texto = '';

    let posArroba = email.indexOf('@');
    let posCom = email.indexOf('.com');

    if(email == '' || senha == ''){
        texto = 'Preencha todos os campos';
    } else if(posArroba != -1 && posCom != -1 && posArroba < posCom){
        texto = 'Email válido';
    } else{
        texto = 'Email inválido';
    }

    div_mensagem.innerHTML = texto;
}
   
</script>
