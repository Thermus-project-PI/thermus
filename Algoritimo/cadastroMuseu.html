<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/style.css">
    <title>Cadastro</title>
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="logo">
                <img src="./img/logo.png" alt="Logo Thermus">
                <img src="./img/THERMUS.png">
            </div>
            <div class="campos">
                <input type="text" class="campo" placeholder="Nome Completo">
                <input type="text" class="campo" placeholder="Email">
                <input type="text" class="campo" placeholder="Intituição">
                <input type="text" class="campo" placeholder="Cargo">
            </div>
            <div class="buttonL">
                <button class="btnLogin">Cadastrar</button>
            </div>
            <div class="urlCadastro">
                <p>Ja possui uma conta?<a href="/login.html">Clique aqui</a></p>
            </div>
        </div>
    </div>
</body>
</html>
<script>
 function cadastrar() {
        let nome = ipt_nome.value;
        let email = ipt_email.value;
        let senha = ipt_senha.value;
        let cnpj = ipt_cnpj.value;
        let status = ipt_ativo.value;
        let texto = '';

        let posArroba = email.indexOf('@');
        let posCom = email.indexOf('.com');

        if (nome == '' || email == '' || senha == '' || cnpj == '') {
            texto = 'Preencha todos os campos corretamente';
        }else if (!(posArroba != -1 && posCom != -1 && posArroba < posCom)) {
            texto = 'Email inválido';
        }else if (cnpj.length != 14) {
            texto = 'CNPJ deve ter 14 caracteres';
        }else if (senha.length < 6) {
            texto = 'Senha deve ter pelo menos 6 caracteres';
        }else {
            texto = 'Cadastro realizado com sucesso';
        }

        div_mensagem.innerHTML = texto;
    }
</script>
