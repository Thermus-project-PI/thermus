<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/Algoritimo/styles/style.css">
    <title>Cadastro</title>
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="logo">
                <img src="/Algoritimo/img/logo.png" alt="Logo Thermus">
                <img src="/Algoritimo/img/THERMUS.png">
            </div>
            <div class="campos">
                <input type="text" class="campo" placeholder="Nome Completo" id="ipt_nome">
                <input type="text" class="campo" placeholder="Email" id="ipt_email">
                <input type="text" class="campo" placeholder="Senha" id="ipt_senha">
                <input type="text" class="campo" placeholder="Intituição" id="ipt_instituicao">
                <input type="text" class="campo" placeholder="Cnpj" id="ipt_cnpj">
            </div>
            <div class="buttonL" id="div_mensagem">
                <button class="btnLogin" onclick="cadastrar()">Cadastrar</button>
            </div>
            <div class="urlCadastro" >
                <p>Ja possui uma conta?<a href="/Algoritimo/auth/museu/login.html">Clique aqui</a></p>
            </div>
        </div>
    </div>
</body>
</html>
<script>
 function cadastrar() {
    let nome = ipt_nome.value;
    let email = ipt_email.value;
    let senha = ipt_senha.value;
    let cnpj = ipt_cnpj.value;
    let instituicao = ipt_instituicao.value
   
    

    let posArroba = email.indexOf('@');
    let posCom = email.indexOf('.com');

    if (nome == '') {
        div_mensagem.innerHTML = 'Preencha o nome do museu';
        return;
    }

    if (email == '') {
        div_mensagem.innerHTML = 'Preencha o email';
        return;
    }

    if (
        posArroba <= 0 || 
        posCom <= posArroba + 1 || 
        posCom != email.length - 4
    ) {
        div_mensagem.innerHTML = 'Email inválido';
        return;
    }

    if (senha == '') {
        div_mensagem.innerHTML = 'Preencha a senha';
        return;
    }

    if (senha.length < 6) {
        div_mensagem.innerHTML = 'Senha deve ter pelo menos 6 caracteres';
        return;
    }

    if (cnpj == '') {
        div_mensagem.innerHTML = 'Preencha o CNPJ';
        return;
    }

    if (cnpj.length != 14) {
        div_mensagem.innerHTML = 'CNPJ deve ter 14 caracteres';
        return;
    }

    div_mensagem.innerHTML = 'Cadastro realizado com sucesso';
}
</script>
