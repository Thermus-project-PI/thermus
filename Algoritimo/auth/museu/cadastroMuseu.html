<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/Algoritimo/styles/style.css">
    <title>Cadastro</title>
</head>
<body>
    <div class="container">
        <div class="content">
            <a href="/index.html"><img src="/Algoritimo/img/seta.png" class="seta"></a>
            <div class="logo">
                <img src="/Algoritimo/img/logo.png" alt="Logo Thermus">
                <img src="/Algoritimo/img/THERMUS.png">
            </div>
            <div class="campos">
                <input type="text" class="campo" placeholder="Nome Completo" id="InNome">
                <p style="display: none; color: red;" id="nomeIn">Nome Inválido</p>
                <input type="text" class="campo" placeholder="Email" id="InEmail">
                <p style="display: none; color: red;" id="emailIn">Email Inválido</p>
                <input type="text" class="campo" placeholder="Senha" id="InSenha">
                <p style="display: none; color: red;" id="senhaIn">Senha Inválida</p>
                <input type="text" class="campo" placeholder="Intituição" id="InInstituicao">
                <p style="display: none; color: red;" id="instituicaoIn">instituição Inválida</p>
                <input type="text" class="campo" placeholder="Cnpj" id="InCnpj" maxlength="14">
                <p style="display: none; color: red;" id="cnpjIn">instituição Inválida</p>
                <button class="botao" onclick="cadastrar()">Cadastrar</button>
                <p class="mensagem">Ja possui uma conta? <a href="/Algoritimo/auth/museu/login.html">Clique aqui</a></p>
                <div class="aviso" id="div_mensagem"></div>
            </div>
        </div>
    </div>
</body>
</html>
<script>
 function cadastrar() {
    let nome = InNome.value;
    let email = InEmail.value;
    let senha = InSenha.value;
    let cnpj = InCnpj.value;
    let instituicao = InInstituicao.value
   
    

    let posArroba = email.indexOf('@');
    let posCom = email.indexOf('.com');

       if (nome == '') {
        InNome.style.border = "solid red 3px";
        nomeIn.style.display = "block"
        return;
    }else{
        InNome.style.border = "none"
        nomeIn.style.display = "none"
    }

    if (email == '') {
        InEmail.style.border = "solid red 3px";
        emailIn.style.display = "block"
        return;
    }else{
        InEmail.style.border = "none";
        emailIn.style.display = "none";
    }

    
    if ( //verifica se tem @, algo entre o @ e o .com e se termina com .com
        posArroba <= 0 || 
        posCom <= posArroba + 1 || 
        posCom != email.length - 4
    ) {
        InEmail.style.border = "solid red 3px";
        emailIn.style.display = "block"
        return;
    } else{
        InEmail.style.border = "none";
        emailIn.style.display = "none";
    }

    if (senha == '') {
        InSenha.style.border = "solid red 3px";
        emailIn.style.display = "none";
        return;
    } else{
        InSenha.style.border = "none";
        emailIn.style.display = "none";
    }

    if (senha.length < 6) {
        InSenha.style.border = "solid red 3px";
        emailIn.style.display = "none";
        return;
    }else{
        InSenha.style.border = "none";
        emailIn.style.display = "none";
    }

    if (cnpj == '') {
        InCnpj.style.border = "solid red 3px";
        cnpjin.style.border = "none";
    }else{
        InCnpj.style.border = "none";
        cnpjin.style.border = "none";
    }

    if (cnpj.length != 14) {
        InCnpj.style.border = "solid red 3px";
        cnpjin.style.border = "none";
    } else{
        InCnpj.style.border = "none";
        cnpjin.style.border = "none";
    }

    div_mensagem.innerHTML = 'Cadastro realizado com sucesso';
}
</script>
