<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Algoritimo/styles/style.css">
    <title>Login</title>
</head>

<body>
    <div class="container">
        <div class="content">
           <a href="/Algoritimo/index.html"><img src="/Algoritimo/img/seta.png" class="seta"></a>
            <div class="logo">
                <img src="/Algoritimo/img/logo.png" alt="Logo Thermus">
                <img src="/Algoritimo/img/THERMUS.png">
            </div>
            <div class="campos" >
                <input type="text" class="campo" placeholder="Email" id="ipt_email">
                <input type="password" class="campo" placeholder="Senha" id="ipt_senha">
                <p>Esqueceu sua senha?<a href="/Algoritimo/auth/">Clique aqui</a></p>
            </div>
            <div class="buttonL" id="div_mensagem">
                <button class="btnLogin" onclick="validar()">Entra</button>
            </div>
            <div class="urlCadastro">
                <p>Ainda não possui uma conta?<a href="/Algoritimo/auth/museu/cadastroMuseu.html">Clique aqui</a></p>
        </div>
    </div>
</body>

</html>
<script>

function validar() {
    let email = ipt_email.value;
    let senha = ipt_senha.value;

    let posArroba = email.indexOf('@');
    let posCom = email.indexOf('.com');

    if (email == '') {
        div_mensagem.innerHTML = 'Preencha o email';
        return;
    }

    if (
        posArroba <= 0 || 
        posCom <= posArroba + 1 || 
        posCom != email.length - 4
    ) {
        div_mensagem.innerHTML = 'Email inválido';
        return;
    }

    if (senha == '') {
        div_mensagem.innerHTML = 'Preencha a senha';
        return;
    }

    div_mensagem.innerHTML = 'Login válido';
}
</script>
