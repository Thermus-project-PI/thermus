<style>
    body{
        padding: 0;

    .container{
        width: 100%;

    .campos{
        padding: 20px;

    }

    .campo{
        background-color: #D9D9D9;

    }

    .buttonL{
        width: 100%;
        height: fit-content;
        display: flex;

        align-items: center;
    }

    .btnLogin{
        border: none;
        background-color: #21516C;
        color: white;
        width: 40%;
        border-radius: 10px;
        height: 3rem;
        font-family: "Playfair Display", serif;
        font-optical-sizing: auto;
         font-style: normal;
         font-weight: 100;
    }

    .urlCadastro{
        display: flex;
        justify-content: flex-start;
    }

    .urlCadastro a{
        color: #21516C;
    }
</style>
<body>

    <div class="container">
        <div class="content">
            <div class="btnBack">
                <a href="/index"><img src="img/seta.png" style="width: 10%; height: 10%;"></a>
            </div>
            <div class="logo">

            </div>
            <div class="campos">
                <input type="text" class="campo" id="InNome" placeholder="Nome Completo">
                <input type="text" class="campo" id="InEmail" placeholder="Email">
                <input type="text" class="campo" id="InInstituicao" placeholder="Instituição">
                <input type="text" class="campo" id="InCargo" placeholder="Cargo">

                <button class="btnLogin">Entrar</button>

<script>
 function cadastrar() {
        let nome = ipt_nome.value;
        let email = ipt_email.value;
        let senha = ipt_senha.value;
        let cnpj = ipt_cnpj.value;
        let status = ipt_ativo.value;
        let texto = '';

        let posArroba = email.indexOf('@');
        let posCom = email.indexOf('.com');

        if (nome == '' || email == '' || senha == '' || cnpj == '') {
            texto = 'Preencha todos os campos corretamente';
        }else if (!(posArroba != -1 && posCom != -1 && posArroba < posCom)) {
            texto = 'Email inválido';
        }else if (cnpj.length != 14) {
            texto = 'CNPJ deve ter 14 caracteres';
        }else if (senha.length < 6) {
            texto = 'Senha deve ter pelo menos 6 caracteres';
        }else {
            texto = 'Cadastro realizado com sucesso';
        }

        div_mensagem.innerHTML = texto;
    }
</script>
