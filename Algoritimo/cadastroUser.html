<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/style.css">
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="logo">
                <img src="./img/logo.png" alt="Logo Thermus">
                <img src="./img/THERMUS.png">
            </div>
            <div class="campos">
                <input type="text" class="campo" placeholder="Nome Completo" id="InNome">
                <input type="text" class="campo" placeholder="Email" id="InEmail">
                <input type="text" class="campo" placeholder="Intituição" id="InInstituicao">
                <input type="text" class="campo" placeholder="Cargo" id="InCargo">
            </div>
            <div class="buttonL" id="div_mensagem">
                <button class="btnLogin" onclick="cadastrar()">Cadastrar</button>
            </div>
            <div class="urlCadastro">
                <p>Ja possui uma conta?<a href="/login.html">Clique aqui</a></p>
            </div>
        </div>
    </div>
</body>
</html>
<script>

function cadastrar() {
    let nome = InNome.value;
    let email = InEmail.value;
    let instituicao = InInstituicao.value;
    let cargo = InCargo.value;

    let posArroba = email.indexOf('@');
    let posCom = email.indexOf('.com');

    if (nome == '') {
        div_mensagem.innerHTML = 'Preencha o nome';
        return;
    }

    if (email == '') {
        div_mensagem.innerHTML = 'Preencha o email';
        return;
    }

    if ( //verifica se tem algo antes do @, algo entre o @ e o .com e se termina com .com
        posArroba <= 0 || 
        posCom <= posArroba + 1 || 
        posCom != email.length - 4
    ) {
        div_mensagem.innerHTML = 'Email inválido';
        return;
    }

    if (instituicao == '') {
        div_mensagem.innerHTML = 'Preencha a instituição';
        return;
    }

    if (cargo == '') {
        div_mensagem.innerHTML = 'Preencha o cargo';
        return;
    }

    div_mensagem.innerHTML = 'Cadastro realizado com sucesso';
}
</script>
